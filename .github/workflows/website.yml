on:
  workflow_call:

jobs:
  deployment:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: build
        # TanStack Start prerender server doesn't exit after completion
        # timeout kills it, then we verify .output exists
        run: |
          timeout 300 bun run build || true
          test -d packages/documentation/.output/server

