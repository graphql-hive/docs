on:
  workflow_call:

jobs:
  deployment:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: "temporary deploy to Piotr's Vercel account"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_yDNaxOv70B1OWKrLECwUJo5H
          VERCEL_PROJECT_ID: prj_ISkyItJ2df8zZAS564zOrYQYxCxG
        run: |
          cd packages/documentation
          bun i -g vercel

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV_FLAG="production"
            PROD_FLAG="--prod"
          else
            ENV_FLAG="preview"
            PROD_FLAG=""
          fi

          # Build with VERCEL preset (outputs to .output/ for prerender compatibility)
          VERCEL=1 CI=true bun run build

          # Move output to where vercel deploy --prebuilt expects it
          mv .output .vercel/output

          vercel deploy --prebuilt --token=$VERCEL_TOKEN $PROD_FLAG

